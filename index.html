<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico Financiero Integral CrowdCapital</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="particles"></canvas>

  <main class="app">
    <section class="hero">
      <div class="brand">CrowdCapital Col.</div>
      <h1>Diagnóstico Financiero Integral</h1>
      <p>
        Evalúa tu realidad financiera actual, identifica riesgos y descubre oportunidades
        de mejora con un diagnóstico personalizado.
      </p>
      <button type="button" id="startBtn">Iniciar diagnóstico</button>
    </section>

    <section class="form-panel hidden" id="formPanel">
      <div class="progress">
        <span id="stepLabel">Pregunta 1</span>
        <div class="bar">
          <div id="progressFill"></div>
        </div>
      </div>

      <form id="diagnosticForm" novalidate>
        <div class="actions">
          <button type="button" id="prevBtn">Atrás</button>
          <button type="button" id="nextBtn">Siguiente</button>
          <button type="submit" id="submitBtn" class="hidden">Generar informe</button>
        </div>
      </form>

      <section id="result" class="result hidden"></section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
